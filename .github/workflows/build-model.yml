name: Build Flower Model

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - model.py
      - requirements.txt
      - .github/workflows/build-model.yml

jobs:
  train-and-export:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train and export model
        run: python model.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: flower-model-h5
          path: flower_model.h5
          if-no-files-found: error
